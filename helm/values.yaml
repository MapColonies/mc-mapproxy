global:
  cloudProvider:
    dockerRegistryUrl: my-registry-url.io
    imagePullSecretName: "my-registry-secret"
    flavor: openshift
  tracing:
    enabled: false
    url: ""
    samplingRatioDenominator: 1000
  metrics:
    enabled: false
    url: ""
    prometheus:
      scrape: false
      port: 9117
  environment: ""
  authentication:
    jwtPublicKeySecretName: map-colonies-jwks
  opalaEnabled: false
  storage:
    tilesStorageProvider: ""
    mapproxyConfigProvider: ""
    fs:
      internalPvc:
        enabled: false
        name: ""
        tilesSubPath: ""
    s3:
      endpointUrl: ""
      tilesBucket: ""
      sslEnabled: false
      secretName: ""
      username: ""
  db:
    host: ""
    name: ""
    port: 5432
    sslEnabled: false
    schema: ""
    rejectUnauthorized: false
    secrets:
      useExternal: false
      externalSecretName: ""
  ca:
    secretName: "root-ca"
    path: "/usr/local/share/ca-certificates"
    key: "ca.crt"
  gracefulReloadMaxSeconds: 300

authentication:
  ssl:
    enabled: false
    useExternal: false
    externalSecretName: ""

storage:
  tilesStorageProvider: ""
  mapproxyConfigProvider: ""
  fs:
    internalPvc:
      enabled: false
      name: ""
      tilesSubPath: ""
  s3:
    endpointUrl: ""
    tilesBucket: ""
    sslEnabled: false
    secretName: ""
    username: ""

db:
  host: ""
  name: ""
  port: 5432
  sslEnabled: false
  schema: ""
  rejectUnauthorized: false
  secrets:
    useExternal: false
    externalSecretName: ""

tracing:
  enabled: false
  url: ""
  # samplingRatioDenominator: 1000
metrics:
  enabled: false
  url: ""
  prometheus:
    scrape: false
    port: 9117

# add pod annotations
# example:
# podAnnotations:
# annotation1: annotation-value-1
# annotation2: annotation-value-2
podAnnotations: {}

environment: development
initialDelaySeconds: 60
splunkIndex: ""
resetOnConfigChange: true
imagePullPolicy: Always

cloudProvider:
  dockerRegistryUrl: my-registry-url.io
  imagePullSecretName: "my-registry-secret"
  flavor: openshift

mclabels:
  #environment: development
  component: backend
  partOf: serving
  owner: raster
  gisDomain: raster
  prometheus:
    enabled: true
    port: 9117
  logScraping: true

mapproxy:
  enabled: true
  socket:
    connectionTimeoutSeconds: 0.1 # Set a connection timeout, nonnegative floating point number expressing *seconds*.
    timeoutSeconds: 0.1 # Set a operation timeout nonnegative, floating point number expressing *seconds*.
  redis:
    tls: false
    healthCheckInterval: 0
    sslCertReqs: "optional" # 'required'/'optional'/'none'
  s3:
    maxAttempts: 1
    retryMode: standard
  wms:
    enabled: false
    replicaCount: 1
    resources:
      enabled: true
      value:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 200m
          memory: 128Mi
    nodePort: 30001
  wmts:
    enabled: true
    replicaCount: 1
    resources:
      enabled: true
      value:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 100m
          memory: 128Mi
    nodePort: 30002
  image:
    repository: docker-mapproxy
    tag: "latest"
  db:
    nameOverride:
    schema: MapproxyConfig
  port: 80
  targetPort: 8080
  uwsgi:
    socket: 3031
    httpSocket: 8080
    processes: 6
    threads: 10
    harakiri: 120 # max seconds a worker may spend on a single request
    disableLogging: true
    timeoutSeconds: 8
    statsServer:
      stats: 1717
      statsMinify: true

  env:
    cors:
      enabled: true
      allowedOrigin: "*"
      allowedHeaders: "x-api-key"
      allowedMethods: "GET,OPTIONS"
    telemetry:
      traceDebug: false # set true locally to enable ConsoleSpanExporter
      boto:
        enabled: false
        captureHeaders: false
      http:
        enabled: true
      sql:
        enabled: false
      tileCache:
        enabled: false
    ssl:
      # external paths
      CA_DIR: /opt/certs/ca/
      KEY_DIR: /opt/certs/key/
      CERT_DIR: /opt/certs/cert/
      CA_FILE_LOCATION: /opt/certs/ca/ca.pem
      KEY_FILE_LOCATION: /opt/certs/key/key.pem
      CERT_FILE_LOCATION: /opt/certs/cert/cert.pem
    openApiFilePath: ./openapi3.yaml
    requestsLogLevel: WARNING
    logLevel: WARNING
    logPrettyPrintEnabled: false
    responseCompressionEnabled: true
    requestPayloadLimit: 1mb

initContainer:
  image:
    repository: mapproxinator
    tag: "latest"
  env:
    logLevel: warn
    ssl:
      CA_DIR: /opt/certs/ca/
      KEY_DIR: /opt/certs/key/
      CERT_DIR: /opt/certs/cert/
      CA_FILE_LOCATION: /opt/certs/ca/ca.pem
      KEY_FILE_LOCATION: /opt/certs/key/key.pem
      CERT_FILE_LOCATION: /opt/certs/cert/cert.pem
  resources:
    enabled: true
    value:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi

nginx:
  enabled: true
  # Declared explicitly so the workload's `app` label / selector / resource
  # names are specific to this service (app: nginx-mapproxy) rather than the
  # chart's generic default of `nginx` introduced in 2.2.1. See docs/adr.
  nameOverride: nginx-mapproxy
  fullnameOverride: ""
  replicaCount: 1
  image:
    repository: common/nginx
    tag: "v2.2.1"
  volume:
    storage: 1000Mi
    accessModes: ReadWriteOnce
  cache:
    enabled: true
    cachePath: /cache
    levels: "1:2" # levels sets up a two‑level directory hierarchy under
    keysZone: mapproxy_cache
    keysZoneSize: 10m # 10m is about 80,000 keys
    maxSize: 900m # physical memory
    inactive: 60m
    expirationTime: 60m
    useTempPath: "off"

  nginx:
    extensions:
      server:
        enabled: true
        fileName: mapproxy-server.conf
      location:
        enabled: true
        fileName: mapproxy-location.conf

  port: 8080
  internalServicePort: 80
  nginxTargetPort: 8080
  targetPort: 8080
  nodePort: 30003

  # The root location is handled by uwsgi_pass from mapproxy-location.conf,
  # so the chart's built-in proxy_pass backend must stay off.
  backend:
    enabled: false

  authorization:
    enabled: false
    url: http://opa-int-opa-service.infra-services/v1/data/http/authz/decision
    token:
      queryName: token
    wms:
      enabled: true
      domain: "rasterWms"
    wmts:
      domain: "raster"

  extraVolumes:
  - name: nginx-config
    configMap:
      # must match nginx-configmap.fullname (<release>-<chart>-nginx-configmap);
      # tpl runs in the nginx subchart context, so the chart name is spelled out
      name: "{{ .Release.Name }}-mapproxy-nginx-configmap"
  - name: cache #TODO: Find solution to mount cache volume with condition
    emptyDir:
      sizeLimit: "{{ .Values.volume.storage }}"
      medium: "Memory"

  extraVolumeMounts:
  - name: nginx-config
    mountPath: "/etc/nginx/log_format.conf"
    subPath: log_format.conf
  - name: nginx-config
    mountPath: "/etc/nginx/nginx.mapproxy.conf"
    subPath: nginx.mapproxy.conf
  - name: nginx-config
    mountPath: "/etc/nginx/nginx.mapproxy.wmts.conf"
    subPath: nginx.mapproxy.wmts.conf
  - name: nginx-config
    mountPath: "/etc/nginx/conf.d/mapproxy-http.conf"
    subPath: mapproxy-http.conf
  - name: nginx-config
    mountPath: "/etc/nginx/conf.d/extensions/mapproxy-server.conf"
    subPath: mapproxy-server.conf
  - name: nginx-config
    mountPath: "/etc/nginx/conf.d/extensions/mapproxy-location.conf"
    subPath: mapproxy-location.conf
  - name: cache
    mountPath: "/cache"

  route:
    enabled: true
    routesMapping:
    - host:
      path: /api/raster/v1
    timeout:
      enabled: false # defaults to 30s by openshift
      duration: 60s # supported units (us, ms, s, m, h, d)
    tls:
      enabled: true
      useCerts: false
      certificate: ""
      key: ""
      caCertificate: ""

  ingress:
    enabled: false
    type: "nginx-org" # supported values: 'nginx-org' | 'nginx-kubernetes'
    path: /api/raster/v1
    host: "localhost"
    tls:
      enabled: true
      useExternal: ""

  resources:
    enabled: true
    value:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi

  opentelemetry:
    serviceName: mapproxy-nginx
    exporterHost: ""
    exporterPort: 4317
    samplerMethod: "AlwaysOff"
    ratio: 10

  mclabels:
    environment: development
    owner: raster
    partOf: serving
    component: proxy-server
    prometheus:
      enabled: true
      port: 9113
    logScraping: true

  prometheusExporter:
    enabled: false
    # image intentionally not overridden — inherits the chart default
    # (common/nginx-prometheus-exporter:1.5.1) as of nginx chart 2.2.1.
    resources:
      enabled: true
      value:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 100m
          memory: 128Mi

mapproxinator:
  enabled: true
  replicaCount: 1
  image:
    repository: mapproxinator
    tag: "latest"
  port: 80
  targetPort: 8081
  nodePort: 30002
  env:
    logLevel: warn
    poll:
      timeout:
        frequencyMS: 5000
    logPrettyPrintEnabled: false
    responseCompressionEnabled: true
    requestPayloadLimit: 1mb
    ssl:
      # external paths
      CA_DIR: /opt/certs/ca/
      KEY_DIR: /opt/certs/key/
      CERT_DIR: /opt/certs/cert/
      CA_FILE_LOCATION: /opt/certs/ca/ca.pem
      KEY_FILE_LOCATION: /opt/certs/key/key.pem
      CERT_FILE_LOCATION: /opt/certs/cert/cert.pem
  resources:
    enabled: false
    value:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 100m
        memory: 128Mi

uwsgiExporter:
  image:
    repository: "timonwong/uwsgi-exporter"
    tag: "latest"
  env:
    logLevel: info # one of [debug, info, warn, error]
  port: 9117
  resources:
    enabled: true
    value:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
